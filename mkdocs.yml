site_name: agentic-os-core
site_description: A hardcore memory & planning engine for AI Agents
site_url: https://github.com/xuwenyao/agentic-os-core
repo_url: https://github.com/xuwenyao/agentic-os-core
repo_name: xuwenyao/agentic-os-core

theme:
  name: material
  palette:
    primary: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest

nav:
  - Home: index.md
  - Architecture: architecture.md
  - API Reference: api-reference.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - admonition
  - codehilite
